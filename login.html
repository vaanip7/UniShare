<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>UniShare — Login</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #ffffff;
      color: #1a1a1a;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .right-panel {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      background: #ffffff;
      width: 100%;
    }

    .form-container {
      width: 100%;
      max-width: 380px;
    }

    .form-header {
      margin-bottom: 2rem;
    }

    .form-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #1a1a1a;
      margin-bottom: 6px;
      letter-spacing: -0.3px;
    }

    .form-header p {
      font-size: 13px;
      color: #6b6b68;
    }

    .role-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: #f5f5f3;
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 1.75rem;
      border: 0.5px solid rgba(0,0,0,0.1);
    }

    .role-btn {
      padding: 9px 0;
      border: none;
      background: transparent;
      border-radius: 7px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: #6b6b68;
      transition: all 0.18s ease;
    }

    .role-btn.active {
      background: #ffffff;
      color: #1a1a1a;
      border: 0.5px solid rgba(0,0,0,0.18);
    }

    .role-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e6f1fb;
      color: #185fa5;
      font-size: 11px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 14px;
    }

    .role-badge.faculty {
      background: #e1f5ee;
      color: #0f6e56;
    }

    .role-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
    }

    .field { margin-bottom: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b6b68;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      height: 42px;
      border: 0.5px solid rgba(0,0,0,0.12);
      border-radius: 8px;
      padding: 0 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      background: #ffffff;
      color: #1a1a1a;
      outline: none;
      transition: border-color 0.15s;
    }

    .field input:hover { border-color: rgba(0,0,0,0.22); }
    .field input:focus { border-color: rgba(0,0,0,0.35); box-shadow: 0 0 0 3px rgba(55,138,221,0.1); }
    .field input.error { border-color: #E24B4A; box-shadow: 0 0 0 3px rgba(226,75,74,0.1); }

    .field-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .field-row label {
      font-size: 12px;
      font-weight: 500;
      color: #6b6b68;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .forgot-link {
      font-size: 12px;
      color: #378ADD;
      text-decoration: none;
    }

    .forgot-link:hover { text-decoration: underline; }

    .error-msg {
      font-size: 12px;
      color: #E24B4A;
      margin-top: 5px;
      display: none;
    }

    .submit-btn {
      width: 100%;
      height: 44px;
      background: #0f1c2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .submit-btn:hover { opacity: 0.88; }
    .submit-btn:active { transform: scale(0.99); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 1.25rem 0;
    }

    .divider hr {
      flex: 1;
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.1);
    }

    .divider span {
      font-size: 12px;
      color: #6b6b68;
    }

    .register-link {
      text-align: center;
      font-size: 13px;
      color: #6b6b68;
    }

    .register-link a {
      color: #378ADD;
      text-decoration: none;
      font-weight: 500;
    }

    .register-link a:hover { text-decoration: underline; }

    @media (max-width: 768px) {
      .right-panel { padding: 2rem 1.5rem; min-height: 100vh; }
    }
  </style>
</head>

<body>

<div class="page">

  <div class="right-panel">
    <div class="form-container">

      <div class="form-header">
        <h2 id="form-title">Welcome back</h2>
        <p id="form-sub">Sign in to your UniShare account</p>
      </div>

      <div class="role-toggle">
        <button class="role-btn active" id="btn-student" onclick="switchRole('student')">Student</button>
        <button class="role-btn" id="btn-faculty" onclick="switchRole('faculty')">Faculty</button>
      </div>

      <div id="role-badge" class="role-badge">
        <div class="role-dot"></div>
        <span id="badge-text">Signing in as Student</span>
      </div>

      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@university.edu" />
        <div class="error-msg" id="email-err">Please enter a valid email address.</div>
      </div>

      <div class="field">
        <div class="field-row">
          <label for="password">Password</label>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>
        <input type="password" id="password" placeholder="Enter your password" />
        <div class="error-msg" id="pass-err">Password cannot be empty.</div>
      </div>

      <button class="submit-btn" id="login-btn" onclick="handleLogin()">
        <span id="btn-label">Sign in as Student</span>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M3 7H11M11 7L8 4M11 7L8 10" stroke="white" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="divider">
        <hr /><span>or</span><hr />
      </div>

      <div class="register-link">
        Don't have an account? <a href="register.html">Register here</a>
      </div>

    </div>
  </div>

</div>

<script>
  let currentRole = 'student';

  function switchRole(role) {
    currentRole = role;
    const isStudent = role === 'student';

    document.getElementById('btn-student').classList.toggle('active', isStudent);
    document.getElementById('btn-faculty').classList.toggle('active', !isStudent);

    const badge = document.getElementById('role-badge');
    badge.className = 'role-badge' + (isStudent ? '' : ' faculty');
    document.getElementById('badge-text').textContent = isStudent ? 'Signing in as Student' : 'Signing in as Faculty';
    document.getElementById('btn-label').textContent  = isStudent ? 'Sign in as Student'    : 'Sign in as Faculty';
    document.getElementById('form-title').textContent = isStudent ? 'Welcome back'           : 'Faculty portal';
    document.getElementById('form-sub').textContent   = isStudent
      ? 'Sign in to your UniShare account'
      : 'Access your courses and submissions';
    document.getElementById('email').placeholder = isStudent
      ? 'you@university.edu'
      : 'faculty@university.edu';
  }

  function handleLogin() {
    const email    = document.getElementById('email').value.trim();
    const pass     = document.getElementById('password').value.trim();
    const emailEl  = document.getElementById('email');
    const passEl   = document.getElementById('password');
    const emailErr = document.getElementById('email-err');
    const passErr  = document.getElementById('pass-err');

    let valid = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailEl.classList.add('error');
      emailErr.style.display = 'block';
      valid = false;
    } else {
      emailEl.classList.remove('error');
      emailErr.style.display = 'none';
    }

    if (!pass) {
      passEl.classList.add('error');
      passErr.style.display = 'block';
      valid = false;
    } else {
      passEl.classList.remove('error');
      passErr.style.display = 'none';
    }

    if (!valid) return;

    if (currentRole === 'student') {
      localStorage.setItem('studentName', email.split('@')[0]);
      window.location.href = 'student-dashboard.html';
    } else {
      window.location.href = 'faculty-dashboard.html';
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleLogin();
  });
</script>

</body>
</html>
